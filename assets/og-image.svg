<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Awesome Claw social preview</title>
  <desc id="desc">Awesome Claw, a community-curated OpenClaw ecosystem directory.</desc>
  <defs>
    <radialGradient id="g1" cx="15%" cy="10%" r="70%">
      <stop offset="0" stop-color="#ff6b4a" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="82%" cy="15%" r="65%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff6b4a"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="70" width="1060" height="490" rx="42" fill="rgba(255,255,255,0.075)" stroke="rgba(255,255,255,0.18)"/>
  </g>

  <g transform="translate(120 118)">
    <rect width="94" height="94" rx="30" fill="url(#mark)"/>
    <text x="47" y="64" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="48">🦞</text>
  </g>

  <text x="120" y="285" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="92" font-weight="900" letter-spacing="-5" fill="#f6f8fa">Awesome Claw</text>
  <text x="124" y="355" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700" fill="#b7c2d0">OpenClaw ecosystem directory</text>

  <text x="124" y="435" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="29" fill="#d9e2ec">Resources · Skills · Plugins · Integrations · Workflows</text>

  <g transform="translate(124 487)">
    <rect width="272" height="48" rx="24" fill="#f6f8fa"/>
    <text x="136" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0d1117">awesome-claw.com</text>
  </g>

  <text x="1068" y="520" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800" fill="#7dd3fc">@awesomeclawhub</text>
</svg>
