name: Awesome Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run awesome-lint
        run: npx --yes awesome-lint README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
